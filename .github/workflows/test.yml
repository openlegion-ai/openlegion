name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]" Pillow
      - name: Run tests
        run: |
          # --dist=loadfile keeps tests from one file on a single xdist worker
          # so fixture caches are reused (matters for big files like
          # tests/test_browser_service.py — 493 tests with shared setup).
          pytest \
            tests/ \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_e2e_chat.py \
            --ignore=tests/test_e2e_memory.py \
            --ignore=tests/test_e2e_triggering.py \
            -n auto \
            --dist=loadfile \
            --splits 3 \
            --group ${{ matrix.shard }} \
            --durations=50 \
            --durations-min=1.0

  coverage:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]" Pillow
      - name: Run tests with coverage
        run: |
          pytest \
            tests/ \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_e2e_chat.py \
            --ignore=tests/test_e2e_memory.py \
            --ignore=tests/test_e2e_triggering.py \
            -n auto \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/
